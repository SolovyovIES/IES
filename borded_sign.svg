<?xml version="1.0" encoding="utf-8"?>
<svg width="3000px" height="800px" viewBox="0 0 2000 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиент для молнии -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    
    <!-- Градиент для рамки -->
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.15"/>
    </linearGradient>
    
    <!-- Тень для объёма -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6366F1" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Фоновая рамка со скруглёнными углами -->
  <rect x="80" y="80" width="640" height="640" rx="48" ry="48" 
        fill="url(#frameGrad)" stroke="url(#grad)" stroke-width="6" filter="url(#shadow)"/>
  
  <!-- Молния (масштабирована и центрирована) -->
  <g transform="translate(200, 200) scale(12.5)">
    <path d="M28.905 24.441l-3.727 1.717 4.789-10.498-12.358 6.184 4.773-7.659-7.52-13.053h-7.303l11.933
    14.187-5.86 9.3 3.636-8.912-14.589-14.575-1.458 0v5.389l13.11 11.344-5.302 11.121 14.409-5.754-2.487
    7.302 5.894-2.235 4.218 2.78z" fill="url(#grad)"/>
  </g>

  <!-- Название ИЭР под молнией -->
  <text x="800" y="620" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" 
        font-size="172" font-weight="700" letter-spacing="8" 
        fill="url(#grad)" text-anchor="left">
    ИЭР
  </text>
  
  <!-- Акцентная линия под названием -->
  <rect x="800" y="645" width="360" height="6" rx="2" 
        fill="url(#grad)" opacity="0.5"/>
  
  <!-- Полное название компании (опционально) -->
  <text x="800" y="700" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" 
        font-size="54" font-weight="400" letter-spacing="4" 
        fill="#94A3B8" text-anchor="left">
    ИННОВАЦИОННЫЕ ЭНЕРГЕТИЧЕСКИЕ РЕШЕНИЯ
  </text>
</svg>